version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: vanzhub-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vanzhub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vanzhub}
      POSTGRES_DB: ${POSTGRES_DB:-vanzhub}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - vanzhub-network

  redis:
    image: redis:7-alpine
    container_name: vanzhub-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - vanzhub-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: vanzhub-api
    restart: always
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://redis:6379
      BACKEND_PORT: 4000
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION}
      AWS_BUCKET_NAME: ${AWS_BUCKET_NAME}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
    depends_on:
      - postgres
      - redis
    command: sh -c "npx prisma generate && npx prisma db push && node dist/index.js"
    networks:
      - vanzhub-network

  nginx:
    image: nginx:alpine
    container_name: vanzhub-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./frontend/.next:/var/www/frontend
      - ./backend/uploads:/var/www/uploads
      - certbot_data:/etc/letsencrypt
    depends_on:
      - backend
    networks:
      - vanzhub-network

networks:
  vanzhub-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  certbot_data:
