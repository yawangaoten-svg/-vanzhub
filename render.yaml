services:
  - type: web
    name: vanzhub-api
    runtime: node
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npx prisma db push
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: vanzhub-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CLOUDINARY_ENABLED
        value: "false"

databases:
  - name: vanzhub-db
    databaseName: vanzhub
    user: vanzhub
    plan: free
